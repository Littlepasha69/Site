  <link rel="stylesheet" href="css/site-2026.css?v=22">
  <link rel="stylesheet" href="css/entrance-2026.css?v=3">
  <script>
    try {
      const terugkerend = localStorage.getItem('onwijze-ingang-gezien') === '1';
      const ingangOpnieuw = new URLSearchParams(location.search).has('welkom');
      if (terugkerend && !ingangOpnieuw) location.replace('home.html');
    } catch (error) {
      // De ingang blijft bruikbaar wanneer lokale opslag niet beschikbaar is.
    }
  </script>
  <script src="js/entrance.js?v=3" defer></script>

<body class="entrance-page">
  <main class="entrance" id="inhoud">
    <span class="entrance__mist entrance__mist--one" aria-hidden="true"></span>
    <span class="entrance__mist entrance__mist--two" aria-hidden="true"></span>

    <div class="entrance__content">
      <p class="entrance__welcome">welkom</p>
      <p class="entrance__quote"><span>Ontleed de mens.</span><span>Je hebt er toevallig één bij je.</span></p>

      <a class="entrance__door" href="home.html" data-enter aria-label="Klik hier om De Onwijze Wijsheden binnen te gaan">
        <span class="entrance__halo" aria-hidden="true"></span>
        <img src="images/enter-home.png" alt="Een gloeiende schelp als toegang tot De Onwijze Wijsheden" width="640" height="640">
        <span class="entrance__invitation">klik hier om binnen te gaan</span>
      </a>

      <div class="entrance__identity">
        <h1>De Onwijze Wijsheden</h1>
        <p>Tussen onzin en openbaring</p>
      </div>
    </div>

    <span class="entrance__bloom" aria-hidden="true"></span>
