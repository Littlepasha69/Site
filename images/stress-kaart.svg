<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Stress als mobilisatie en herstel</title>
  <desc id="desc">Twee lijnen tonen een stressreactie die terugkeert naar herstel en een langdurige belasting die verhoogd blijft.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#24162f"/><stop offset=".55" stop-color="#4a2948"/><stop offset="1" stop-color="#164b48"/></linearGradient>
    <radialGradient id="glow"><stop offset="0" stop-color="#f0c66b" stop-opacity=".36"/><stop offset="1" stop-color="#f0c66b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="1030" cy="82" r="370" fill="url(#glow)"/>
  <text x="72" y="82" fill="#f0c66b" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="4">DE MENSELIJKE ATLAS · EMOTIES &amp; REGULATIE</text>
  <text x="72" y="158" fill="#fffdf9" font-family="Georgia, serif" font-size="60" font-weight="700">Stress wil je voorbereiden.</text>
  <text x="72" y="205" fill="#fff" fill-opacity=".64" font-family="Arial, sans-serif" font-size="21">De vraag is of je systeem ook kan terugkeren.</text>
  <g transform="translate(82 282)">
    <path d="M0 266H1032M0 190H1032M0 114H1032M0 38H1032" fill="none" stroke="#fff" stroke-opacity=".1" stroke-width="2"/>
    <path d="M0 246c105 0 110-174 248-174s135 168 298 168 225-8 486-8" fill="none" stroke="#f0c66b" stroke-width="11" stroke-linecap="round"/>
    <path d="M0 246c100 0 116-144 242-144s146 73 224 38 117-6 176 27 109-41 170-6 136-4 220 22" fill="none" stroke="#d88da2" stroke-width="9" stroke-linecap="round"/>
    <circle cx="248" cy="72" r="13" fill="#f0c66b"/>
    <circle cx="642" cy="167" r="11" fill="#d88da2"/>
    <text x="17" y="302" fill="#fff" fill-opacity=".55" font-family="Arial, sans-serif" font-size="16">rust</text>
    <text x="200" y="302" fill="#fff" fill-opacity=".55" font-family="Arial, sans-serif" font-size="16">mobilisatie</text>
    <text x="510" y="302" fill="#f0c66b" font-family="Arial, sans-serif" font-size="16" font-weight="700">herstel</text>
    <text x="690" y="139" fill="#efb2c1" font-family="Arial, sans-serif" font-size="16" font-weight="700">aanhoudende belasting</text>
  </g>
  <line x1="72" y1="642" x2="1128" y2="642" stroke="#fff" stroke-opacity=".16"/>
  <text x="72" y="682" fill="#fff" fill-opacity=".58" font-family="Arial, sans-serif" font-size="17">Duur · controle · voorspelbaarheid · steun · herstelruimte</text>
</svg>
