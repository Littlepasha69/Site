<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Vijf aangrijpingspunten voor emotieregulatie</title>
  <desc id="desc">Een golvende route met vijf mogelijke plaatsen om iets te beïnvloeden: situatie kiezen, situatie veranderen, aandacht verschuiven, betekenis herzien en reactie beïnvloeden. De passende keuze hangt af van context, veiligheid, doel, relaties en cultuur.</desc>
  <defs>
    <linearGradient id="emotionBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#26172f"/>
      <stop offset=".58" stop-color="#4a2948"/>
      <stop offset="1" stop-color="#7b4a4f"/>
    </linearGradient>
    <radialGradient id="emotionGlow"><stop stop-color="#f0c66b" stop-opacity=".25"/><stop offset="1" stop-color="#f0c66b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#emotionBg)"/>
  <circle cx="1060" cy="82" r="250" fill="url(#emotionGlow)"/>
  <circle cx="104" cy="640" r="220" fill="#b66b79" opacity=".1"/>
  <text x="68" y="72" fill="#f0c66b" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="4">LEESKAART · EMOTIEREGULATIE</text>
  <text x="68" y="122" fill="#fffdf9" font-family="Georgia, serif" font-size="38" font-weight="700">Vijf plaatsen waar beweging mogelijk is.</text>
  <text x="68" y="157" fill="#fff" fill-opacity=".64" font-family="Arial, sans-serif" font-size="17">Geen verplichte stappen. Geen rangorde van goed naar slecht.</text>

  <path d="M76 367C167 244 267 245 347 367s181 123 263 0 183-123 265 0 171 122 249 0" fill="none" stroke="#fff" stroke-opacity=".09" stroke-width="92" stroke-linecap="round"/>
  <path d="M76 367C167 244 267 245 347 367s181 123 263 0 183-123 265 0 171 122 249 0" fill="none" stroke="#f0c66b" stroke-opacity=".72" stroke-width="4" stroke-linecap="round"/>

  <g font-family="Arial, sans-serif">
    <g transform="translate(74 264)">
      <circle cx="80" cy="80" r="72" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".2"/>
      <circle cx="80" cy="28" r="24" fill="#f0c66b"/><text x="80" y="35" text-anchor="middle" fill="#301c35" font-size="17" font-weight="800">01</text>
      <text x="80" y="72" text-anchor="middle" fill="#f0c66b" font-size="11" font-weight="700" letter-spacing="1.3">SITUATIE</text>
      <text x="80" y="99" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="22" font-weight="700">kiezen</text>
      <text x="80" y="124" text-anchor="middle" fill="#fff" fill-opacity=".55" font-size="12">opzoeken · mijden</text>
    </g>
    <g transform="translate(286 344)">
      <circle cx="80" cy="80" r="72" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".2"/>
      <circle cx="80" cy="28" r="24" fill="#f0c66b"/><text x="80" y="35" text-anchor="middle" fill="#301c35" font-size="17" font-weight="800">02</text>
      <text x="80" y="72" text-anchor="middle" fill="#f0c66b" font-size="11" font-weight="700" letter-spacing="1.3">SITUATIE</text>
      <text x="80" y="99" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="22" font-weight="700">veranderen</text>
      <text x="80" y="124" text-anchor="middle" fill="#fff" fill-opacity=".55" font-size="12">grens · steun · afstand</text>
    </g>
    <g transform="translate(507 238)">
      <circle cx="80" cy="80" r="72" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".2"/>
      <circle cx="80" cy="28" r="24" fill="#f0c66b"/><text x="80" y="35" text-anchor="middle" fill="#301c35" font-size="17" font-weight="800">03</text>
      <text x="80" y="72" text-anchor="middle" fill="#f0c66b" font-size="11" font-weight="700" letter-spacing="1.3">AANDACHT</text>
      <text x="80" y="99" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="22" font-weight="700">verschuiven</text>
      <text x="80" y="124" text-anchor="middle" fill="#fff" fill-opacity=".55" font-size="12">richten · afleiden</text>
    </g>
    <g transform="translate(728 344)">
      <circle cx="80" cy="80" r="72" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".2"/>
      <circle cx="80" cy="28" r="24" fill="#f0c66b"/><text x="80" y="35" text-anchor="middle" fill="#301c35" font-size="17" font-weight="800">04</text>
      <text x="80" y="72" text-anchor="middle" fill="#f0c66b" font-size="11" font-weight="700" letter-spacing="1.3">BETEKENIS</text>
      <text x="80" y="99" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="22" font-weight="700">herzien</text>
      <text x="80" y="124" text-anchor="middle" fill="#fff" fill-opacity=".55" font-size="12">duiden · herkaderen</text>
    </g>
    <g transform="translate(949 264)">
      <circle cx="80" cy="80" r="72" fill="#f0c66b"/>
      <circle cx="80" cy="28" r="24" fill="#301c35"/><text x="80" y="35" text-anchor="middle" fill="#f0c66b" font-size="17" font-weight="800">05</text>
      <text x="80" y="72" text-anchor="middle" fill="#301c35" font-size="11" font-weight="800" letter-spacing="1.3">REACTIE</text>
      <text x="80" y="99" text-anchor="middle" fill="#301c35" font-family="Georgia, serif" font-size="22" font-weight="700">beïnvloeden</text>
      <text x="80" y="124" text-anchor="middle" fill="#301c35" fill-opacity=".7" font-size="12">uiten · wachten · delen</text>
    </g>
  </g>

  <text x="68" y="570" fill="#f0c66b" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">WAT MEE BEPAALT WAT PASSEND EN MOGELIJK IS</text>
  <g fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"><rect x="68" y="592" width="172" height="44" rx="22"/><rect x="252" y="592" width="172" height="44" rx="22"/><rect x="436" y="592" width="172" height="44" rx="22"/><rect x="620" y="592" width="172" height="44" rx="22"/><rect x="804" y="592" width="172" height="44" rx="22"/><rect x="988" y="592" width="144" height="44" rx="22"/></g>
  <g fill="#fffdf9" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"><text x="154" y="620">doel</text><text x="338" y="620">intensiteit</text><text x="522" y="620">veiligheid</text><text x="706" y="620">relaties</text><text x="890" y="620">cultuur</text><text x="1060" y="620">timing</text></g>
  <text x="68" y="678" fill="#fff" fill-opacity=".48" font-family="Arial, sans-serif" font-size="14">Dezelfde strategie kan op het ene moment helpen en op een ander moment hinderen.</text>
