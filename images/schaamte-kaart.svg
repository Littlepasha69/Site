<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Schaamte en de geleende blik</title>
  <desc id="desc">Een kleine menselijke figuur staat tussen de blik van buitenaf en een open doorgang naar verbinding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#21152d"/><stop offset=".55" stop-color="#4b2947"/><stop offset="1" stop-color="#6e434a"/></linearGradient>
    <radialGradient id="warm"><stop offset="0" stop-color="#f0c66b" stop-opacity=".42"/><stop offset="1" stop-color="#f0c66b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="960" cy="170" r="330" fill="url(#warm)"/>
  <text x="72" y="82" fill="#f0c66b" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="4">DE MENSELIJKE ATLAS · EMOTIES &amp; REGULATIE</text>
  <text x="72" y="158" fill="#fffdf9" font-family="Georgia, serif" font-size="60" font-weight="700">De geleende blik.</text>
  <text x="72" y="205" fill="#fff" fill-opacity=".64" font-family="Arial, sans-serif" font-size="21">Van “ik deed iets” naar “ik ben verkeerd”.</text>
  <g transform="translate(92 282)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 108C94 10 215 10 309 108C215 206 94 206 0 108Z" stroke="#fff" stroke-opacity=".2" stroke-width="4"/>
    <circle cx="154" cy="108" r="48" stroke="#f0c66b" stroke-width="8"/>
    <circle cx="154" cy="108" r="13" fill="#f0c66b" stroke="none"/>
    <path d="M325 108h138" stroke="#f0c66b" stroke-width="4" stroke-dasharray="8 12"/>
  </g>
  <g transform="translate(555 279)">
    <circle cx="96" cy="63" r="36" fill="#f0c66b"/>
    <path d="M44 185c4-61 23-89 52-89s48 28 52 89" fill="#fff" fill-opacity=".1" stroke="#fff" stroke-opacity=".35" stroke-width="4"/>
    <path d="M76 51c8 10 32 10 40 0M77 68c8-7 30-7 38 0" fill="none" stroke="#4b2947" stroke-width="4" stroke-linecap="round"/>
    <text x="96" y="229" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="24" font-weight="700">wie ziet mij?</text>
  </g>
  <g transform="translate(790 280)">
    <path d="M0 190V0h292v190" fill="#fff" fill-opacity=".055" stroke="#fff" stroke-opacity=".18" stroke-width="4"/>
    <path d="M94 190V58h104v132" fill="#f0c66b" fill-opacity=".18" stroke="#f0c66b" stroke-width="4"/>
    <path d="M146 126v96" stroke="#f0c66b" stroke-width="5"/>
    <text x="146" y="238" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="24" font-weight="700">wie laat ik binnen?</text>
  </g>
  <line x1="72" y1="628" x2="1128" y2="628" stroke="#fff" stroke-opacity=".16"/>
  <text x="72" y="674" fill="#fff" fill-opacity=".58" font-family="Arial, sans-serif" font-size="17">Zien wat van jou is, wat je deed en welke norm je hebt geleend.</text>
</svg>
