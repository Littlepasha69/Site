<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Grenzen en moeilijke gesprekken</title><desc id="desc">Twee oevers worden verbonden door een brug van duidelijke zinnen.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#102d31"/><stop offset=".54" stop-color="#245044"/><stop offset="1" stop-color="#59394f"/></linearGradient><radialGradient id="glow"><stop stop-color="#efc467" stop-opacity=".26"/><stop offset="1" stop-color="#efc467" stop-opacity="0"/></radialGradient></defs>
  <rect width="1200" height="720" rx="30" fill="url(#bg)"/><circle cx="600" cy="350" r="300" fill="url(#glow)"/>
  <path d="M0 510C180 430 305 445 470 515V720H0Z" fill="#0a292d" fill-opacity=".72"/><path d="M1200 510C1020 430 895 445 730 515V720h470Z" fill="#2d2840" fill-opacity=".72"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M390 485C470 365 730 365 810 485" stroke="#efc467" stroke-width="8"/><path d="M430 485C495 395 705 395 770 485" stroke="#fff" stroke-opacity=".42" stroke-width="3"/><path d="M510 260h180" stroke="#fff" stroke-opacity=".2" stroke-width="2" stroke-dasharray="7 10"/><path d="M600 215v250" stroke="#fff" stroke-opacity=".12" stroke-width="2" stroke-dasharray="7 10"/></g>
  <g font-family="Arial,sans-serif" text-anchor="middle"><g transform="translate(340 300)"><rect x="-118" y="-48" width="236" height="96" rx="24" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".18"/><text y="-10" fill="#efc467" font-size="12" font-weight="800" letter-spacing="2">MIJN GRENS</text><text y="22" fill="#fff" font-size="18">dit kan ik dragen</text></g><g transform="translate(860 300)"><rect x="-118" y="-48" width="236" height="96" rx="24" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".18"/><text y="-10" fill="#efc467" font-size="12" font-weight="800" letter-spacing="2">JOUW KEUZE</text><text y="22" fill="#fff" font-size="18">dit is van jou</text></g><text x="600" y="330" fill="#efc467" font-size="12" font-weight="800" letter-spacing="3">HET GESPREK</text><text x="600" y="368" fill="#fff9ea" font-family="Georgia,serif" font-size="31" font-weight="700">een brug, geen overgave</text><text x="600" y="650" fill="#dce9e3" font-family="Georgia,serif" font-size="23" font-style="italic">Een grens zegt wat jij zult doen. Een gesprek onderzoekt wat wij kunnen doen.</text></g>
</svg>
