<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">De ruimte waarin twee mensen elkaar veranderen</title>
  <desc id="desc">Twee menselijke vormen staan tegenover elkaar. Tussen hen lopen lijnen naar vier mogelijke veranderingen: verruimen, loslaten, verkleinen en vervormen.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#102f35"/><stop offset=".52" stop-color="#18534f"/><stop offset="1" stop-color="#4c2e4d"/></linearGradient>
    <radialGradient id="between" cx="0" cy="0" r="1" gradientTransform="translate(600 355) rotate(90) scale(300 360)"><stop stop-color="#efc467" stop-opacity=".28"/><stop offset="1" stop-color="#efc467" stop-opacity="0"/></radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="1200" height="720" rx="30" fill="url(#background)"/>
  <rect width="1200" height="720" rx="30" fill="url(#between)"/>
  <circle cx="600" cy="350" r="180" fill="#efc467" fill-opacity=".08" filter="url(#soft)"/>

  <g fill="none" stroke-linecap="round">
    <path d="M330 370C435 285 485 265 600 280C715 265 765 285 870 370" stroke="#efc467" stroke-width="5"/>
    <path d="M330 370C445 365 510 390 600 430C690 390 755 365 870 370" stroke="#dce9e3" stroke-opacity=".7" stroke-width="3"/>
    <path d="M600 280V430" stroke="#fff" stroke-opacity=".2" stroke-width="2" stroke-dasharray="7 10"/>
    <circle cx="600" cy="355" r="118" stroke="#fff" stroke-opacity=".12"/>
    <circle cx="600" cy="355" r="165" stroke="#fff" stroke-opacity=".07"/>
  </g>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(260 355)"><circle r="82" fill="#fff9ea"/><circle cy="-27" r="22" fill="#174a48"/><path d="M218 395c13-45 71-45 84 0" transform="translate(-260 -355)" fill="#174a48"/><text y="119" fill="#fff" font-size="14" font-weight="800" letter-spacing="3">JIJ</text></g>
    <g transform="translate(940 355)"><circle r="82" fill="#dce9e3"/><circle cy="-27" r="22" fill="#4c2e4d"/><path d="M898 395c13-45 71-45 84 0" transform="translate(-940 -355)" fill="#4c2e4d"/><text y="119" fill="#fff" font-size="14" font-weight="800" letter-spacing="3">DE ANDER</text></g>
    <text x="600" y="330" fill="#efc467" font-size="13" font-weight="800" letter-spacing="3">TUSSENRUIMTE</text>
    <text x="600" y="365" fill="#fff9ea" font-family="Georgia, serif" font-size="31" font-weight="700">hier gebeurt iets</text>
    <text x="600" y="397" fill="#dce9e3" font-size="13">waarnemen · antwoorden · herhalen</text>
  </g>

  <g font-family="Arial, sans-serif">
    <g transform="translate(80 95)"><rect width="235" height="86" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><text x="20" y="30" fill="#efc467" font-size="11" font-weight="800" letter-spacing="2">VERRUIMEN</text><text x="20" y="58" fill="#fff" font-size="18" font-weight="700">Er komt iets bij.</text></g>
    <g transform="translate(80 540)"><rect width="235" height="86" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><text x="20" y="30" fill="#efc467" font-size="11" font-weight="800" letter-spacing="2">LOSLATEN</text><text x="20" y="58" fill="#fff" font-size="18" font-weight="700">Iets zwaars valt weg.</text></g>
    <g transform="translate(885 95)"><rect width="235" height="86" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><text x="20" y="30" fill="#efc467" font-size="11" font-weight="800" letter-spacing="2">VERKLEINEN</text><text x="20" y="58" fill="#fff" font-size="18" font-weight="700">Iets eigens verdwijnt.</text></g>
    <g transform="translate(885 540)"><rect width="235" height="86" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><text x="20" y="30" fill="#efc467" font-size="11" font-weight="800" letter-spacing="2">VERVORMEN</text><text x="20" y="58" fill="#fff" font-size="18" font-weight="700">Iets ongewensts groeit.</text></g>
    <text x="600" y="670" fill="#dce9e3" font-family="Georgia, serif" font-size="22" font-style="italic" text-anchor="middle">Niet iedere invloed is groei. Niet iedere verandering is verlies.</text>
  </g>
</svg>
