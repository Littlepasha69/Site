<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1180" role="img" aria-labelledby="title desc">
  <title id="title">Leeskaart neuroplasticiteit voor kleine schermen</title>
  <desc id="desc">Een verticale route van ervaring en oefening via verbindingen en netwerken naar gedrag en functie, met factoren die verandering beïnvloeden.</desc>
  <defs>
    <linearGradient id="bgm" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#082c2b"/><stop offset=".66" stop-color="#174b48"/><stop offset="1" stop-color="#66513c"/></linearGradient>
    <marker id="arrowm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#f0c66b"/></marker>
  </defs>
  <rect width="720" height="1180" rx="36" fill="url(#bgm)"/>
  <circle cx="640" cy="90" r="190" fill="#f0c66b" opacity=".08"/>
  <text x="54" y="62" fill="#f0c66b" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3">LEESKAART · NEUROPLASTICITEIT</text>
  <text x="54" y="112" fill="#fffdf9" font-family="Georgia, serif" font-size="34" font-weight="700">Verandering gebeurt</text>
  <text x="54" y="152" fill="#fffdf9" font-family="Georgia, serif" font-size="34" font-weight="700">op meerdere niveaus.</text>

  <g font-family="Arial, sans-serif">
    <g transform="translate(54 205)">
      <rect width="612" height="154" rx="25" fill="#fff" fill-opacity=".075" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="68" cy="77" r="38" fill="#f0c66b"/><text x="68" y="87" text-anchor="middle" fill="#143d3d" font-size="25" font-weight="800">01</text>
      <text x="132" y="48" fill="#f0c66b" font-size="13" font-weight="700" letter-spacing="2">ERVARING</text>
      <text x="132" y="84" fill="#fffdf9" font-family="Georgia, serif" font-size="28" font-weight="700">Oefenen &amp; meemaken</text>
      <text x="132" y="119" fill="#fff" fill-opacity=".58" font-size="15">specifiek · herhaald · betekenisvol</text>
    </g>
    <path d="M360 367v34" stroke="#f0c66b" stroke-width="3" marker-end="url(#arrowm)"/>
    <g transform="translate(54 410)">
      <rect width="612" height="154" rx="25" fill="#fff" fill-opacity=".075" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="68" cy="77" r="38" fill="#f0c66b"/><text x="68" y="87" text-anchor="middle" fill="#143d3d" font-size="25" font-weight="800">02</text>
      <text x="132" y="48" fill="#f0c66b" font-size="13" font-weight="700" letter-spacing="2">VERBINDINGEN</text>
      <text x="132" y="84" fill="#fffdf9" font-family="Georgia, serif" font-size="28" font-weight="700">Sterker, zwakker of anders</text>
      <text x="132" y="119" fill="#fff" fill-opacity=".58" font-size="15">synapsen · cellen · myeline</text>
    </g>
    <path d="M360 572v34" stroke="#f0c66b" stroke-width="3" marker-end="url(#arrowm)"/>
    <g transform="translate(54 615)">
      <rect width="612" height="154" rx="25" fill="#fff" fill-opacity=".075" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="68" cy="77" r="38" fill="#f0c66b"/><text x="68" y="87" text-anchor="middle" fill="#143d3d" font-size="25" font-weight="800">03</text>
      <text x="132" y="48" fill="#f0c66b" font-size="13" font-weight="700" letter-spacing="2">NETWERKEN</text>
      <text x="132" y="84" fill="#fffdf9" font-family="Georgia, serif" font-size="28" font-weight="700">Samenwerking verschuift</text>
      <text x="132" y="119" fill="#fff" fill-opacity=".58" font-size="15">timing · taakverdeling · efficiëntie</text>
    </g>
    <path d="M360 777v34" stroke="#f0c66b" stroke-width="3" marker-end="url(#arrowm)"/>
    <g transform="translate(54 820)">
      <rect width="612" height="132" rx="25" fill="#f0c66b"/>
      <circle cx="68" cy="66" r="38" fill="#143d3d"/><text x="68" y="76" text-anchor="middle" fill="#f0c66b" font-size="25" font-weight="800">04</text>
      <text x="132" y="55" fill="#143d3d" font-size="13" font-weight="700" letter-spacing="2">MOGELIJKE UITKOMST</text>
      <text x="132" y="91" fill="#143d3d" font-family="Georgia, serif" font-size="28" font-weight="700">Functie &amp; gedrag</text>
    </g>
  </g>

  <text x="54" y="1005" fill="#f0c66b" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">WAT MEE BEPAALT WAT HAALBAAR IS</text>
  <g fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"><rect x="54" y="1030" width="184" height="44" rx="22"/><rect x="250" y="1030" width="184" height="44" rx="22"/><rect x="446" y="1030" width="220" height="44" rx="22"/><rect x="54" y="1086" width="184" height="44" rx="22"/><rect x="250" y="1086" width="184" height="44" rx="22"/><rect x="446" y="1086" width="220" height="44" rx="22"/></g>
  <g fill="#fffdf9" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"><text x="146" y="1058">aandacht</text><text x="342" y="1058">herhaling</text><text x="556" y="1058">rust &amp; slaap</text><text x="146" y="1114">context</text><text x="342" y="1114">gezondheid</text><text x="556" y="1114">leeftijd &amp; veiligheid</text></g>
  <text x="54" y="1162" fill="#fff" fill-opacity=".48" font-family="Arial, sans-serif" font-size="13">De pijlen helpen lezen; in werkelijkheid beïnvloeden de niveaus elkaar.</text>
</svg>
