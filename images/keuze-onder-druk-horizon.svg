<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">De keuzehorizon onder druk</title>
  <desc id="desc">Een brede waaier van mogelijkheden wordt door slaaptekort, pijn, craving, tijdsdruk, schaarste en ontwerp vernauwd tot één fel verlichte directe uitkomst. Onderaan verbreden echte steun en alternatieven de horizon opnieuw.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101a2a"/><stop offset=".53" stop-color="#2d2039"/><stop offset="1" stop-color="#663943"/></linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7bb7a3" stop-opacity=".18"/><stop offset=".7" stop-color="#f0c66b" stop-opacity=".8"/><stop offset="1" stop-color="#ffd878"/></linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#143f3d"/><stop offset="1" stop-color="#276658"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#ffd878" stop-opacity=".8"/><stop offset="1" stop-color="#ffd878" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0a111d" flood-opacity=".45"/></filter>
  </defs>
  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="270" r="155" fill="url(#glow)" opacity=".3" filter="url(#blur)"/>
  <g opacity=".09" fill="none" stroke="#fff" stroke-width="1"><circle cx="1028" cy="286" r="190"/><circle cx="1028" cy="286" r="245"/><path d="M52 87H1148M52 570H1148"/></g>

  <text x="64" y="62" fill="#f0c66b" font-family="Arial,sans-serif" font-size="17" font-weight="800" letter-spacing="3">DE KEUZEHORIZON</text>
  <text x="64" y="101" fill="#fff9ea" font-family="Georgia,serif" font-size="33" font-weight="700">Niet alle mogelijkheden verdwijnen.</text>
  <text x="64" y="134" fill="#d5d5dd" font-family="Arial,sans-serif" font-size="18">Sommige worden tijdelijk donker, duur, traag of onbereikbaar.</text>

  <g font-family="Arial,sans-serif" font-size="15" fill="#d8e9e1">
    <g transform="translate(64 184)"><rect width="170" height="45" rx="22.5" fill="#276658" opacity=".82"/><text x="85" y="28" text-anchor="middle">iemand bellen</text></g>
    <g transform="translate(80 250)"><rect width="138" height="45" rx="22.5" fill="#276658" opacity=".72"/><text x="69" y="28" text-anchor="middle">even wachten</text></g>
    <g transform="translate(54 316)"><rect width="188" height="45" rx="22.5" fill="#276658" opacity=".65"/><text x="94" y="28" text-anchor="middle">de plek verlaten</text></g>
    <g transform="translate(76 382)"><rect width="146" height="45" rx="22.5" fill="#276658" opacity=".55"/><text x="73" y="28" text-anchor="middle">iets eten</text></g>
    <g transform="translate(50 448)"><rect width="194" height="45" rx="22.5" fill="#276658" opacity=".45"/><text x="97" y="28" text-anchor="middle">een grens stellen</text></g>
  </g>

  <g fill="none" stroke="#7bb7a3" stroke-width="3" opacity=".48">
    <path d="M235 206C402 218 522 263 670 303"/><path d="M218 272C390 278 523 295 670 316"/><path d="M242 338C405 335 531 327 670 327"/><path d="M222 404C398 391 522 360 670 340"/><path d="M244 470C402 443 528 384 670 351"/>
  </g>

  <path d="M258 169C455 190 557 244 709 291L709 367C555 406 448 466 258 505C414 477 528 438 687 365C733 344 733 314 687 293C527 221 414 185 258 169Z" fill="#0f1724" opacity=".7"/>
  <path d="M254 160C448 174 577 229 716 287" fill="none" stroke="#c78691" stroke-width="2" opacity=".72"/>
  <path d="M254 514C445 487 575 426 716 371" fill="none" stroke="#c78691" stroke-width="2" opacity=".72"/>

  <g font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffd7cb">
    <g transform="translate(338 195)"><rect width="108" height="34" rx="17" fill="#6f3f51"/><text x="54" y="22" text-anchor="middle">slaaptekort</text></g>
    <g transform="translate(466 223)"><rect width="76" height="34" rx="17" fill="#6f3f51"/><text x="38" y="22" text-anchor="middle">pijn</text></g>
    <g transform="translate(554 254)"><rect width="92" height="34" rx="17" fill="#6f3f51"/><text x="46" y="22" text-anchor="middle">craving</text></g>
    <g transform="translate(360 452)"><rect width="105" height="34" rx="17" fill="#6f3f51"/><text x="52" y="22" text-anchor="middle">tijdsdruk</text></g>
    <g transform="translate(476 419)"><rect width="102" height="34" rx="17" fill="#6f3f51"/><text x="51" y="22" text-anchor="middle">schaarste</text></g>
    <g transform="translate(588 384)"><rect width="82" height="34" rx="17" fill="#6f3f51"/><text x="41" y="22" text-anchor="middle">ontwerp</text></g>
  </g>

  <path d="M696 308C820 294 917 278 1067 260L1067 348C915 332 817 337 696 349Z" fill="url(#beam)" filter="url(#shadow)"/>
  <circle cx="1045" cy="304" r="87" fill="url(#glow)" opacity=".48"/>
  <g transform="translate(900 251)" filter="url(#shadow)"><rect width="238" height="106" rx="24" fill="#f0c66b"/><text x="119" y="34" text-anchor="middle" fill="#513126" font-family="Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="2">FELSTE UITKOMST</text><text x="119" y="72" text-anchor="middle" fill="#251b2c" font-family="Georgia,serif" font-size="27" font-weight="700">opluchting. nu.</text></g>
  <text x="766" y="404" fill="#d6c9d6" font-family="Arial,sans-serif" font-size="15">zichtbaar ≠ vrij gekozen</text>
  <text x="766" y="428" fill="#d6c9d6" font-family="Arial,sans-serif" font-size="15">direct ≠ waardevoller op lange termijn</text>

  <g transform="translate(52 584)" filter="url(#shadow)">
    <rect width="1096" height="126" rx="24" fill="url(#rail)"/>
    <text x="28" y="34" fill="#f0c66b" font-family="Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="2">VERBREED DE HORIZON</text>
    <text x="28" y="66" fill="#fff9ea" font-family="Georgia,serif" font-size="24" font-weight="700">Geen peptalk. Maak een andere keuze werkelijk bereikbaar.</text>
    <g transform="translate(28 82)" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#d9eee5">
      <text x="0" y="18">tijd</text><circle cx="46" cy="13" r="3" fill="#f0c66b"/><text x="62" y="18">slaap</text><circle cx="112" cy="13" r="3" fill="#f0c66b"/><text x="128" y="18">veiligheid</text><circle cx="198" cy="13" r="3" fill="#f0c66b"/><text x="214" y="18">geld</text><circle cx="250" cy="13" r="3" fill="#f0c66b"/><text x="266" y="18">steun</text><circle cx="310" cy="13" r="3" fill="#f0c66b"/><text x="326" y="18">zorg</text><circle cx="358" cy="13" r="3" fill="#f0c66b"/><text x="374" y="18">frictie</text><circle cx="420" cy="13" r="3" fill="#f0c66b"/><text x="436" y="18">een echte uitweg</text>
    </g>
    <path d="M745 93H1028" stroke="#f0c66b" stroke-width="3" stroke-linecap="round"/><path d="M1009 74L1029 93L1009 112" fill="none" stroke="#f0c66b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
