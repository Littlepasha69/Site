<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Pleasen en harmonie bewaren</title><desc id="desc">Een eigen stem beweegt tussen instemmen, stilte en eerlijke afstemming.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#102d34"/><stop offset=".55" stop-color="#23534d"/><stop offset="1" stop-color="#693d50"/></linearGradient><radialGradient id="glow"><stop stop-color="#efc467" stop-opacity=".3"/><stop offset="1" stop-color="#efc467" stop-opacity="0"/></radialGradient></defs>
  <rect width="1200" height="720" rx="30" fill="url(#bg)"/><circle cx="600" cy="355" r="280" fill="url(#glow)"/>
  <g fill="none" stroke-linecap="round"><path d="M180 350C325 225 420 245 600 355C780 465 875 485 1020 350" stroke="#dce9e3" stroke-opacity=".42" stroke-width="4"/><path d="M180 350C330 480 460 465 600 355C740 245 870 220 1020 350" stroke="#efc467" stroke-width="5"/><circle cx="600" cy="355" r="118" stroke="#fff" stroke-opacity=".18"/><circle cx="600" cy="355" r="172" stroke="#fff" stroke-opacity=".08"/></g>
  <g font-family="Arial,sans-serif" text-anchor="middle"><g transform="translate(190 350)"><circle r="68" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".2"/><text y="-5" fill="#efc467" font-size="13" font-weight="800" letter-spacing="2">JA</text><text y="20" fill="#fff" font-size="16">om rust te houden</text></g><g transform="translate(1010 350)"><circle r="68" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".2"/><text y="-5" fill="#efc467" font-size="13" font-weight="800" letter-spacing="2">NEE</text><text y="20" fill="#fff" font-size="16">om mezelf te houden</text></g><text x="600" y="332" fill="#efc467" font-size="12" font-weight="800" letter-spacing="3">EIGEN STEM</text><text x="600" y="374" fill="#fff9ea" font-family="Georgia,serif" font-size="31" font-weight="700">wat wil ik eigenlijk?</text><text x="600" y="408" fill="#dce9e3" font-size="14">verbinding zonder zelfverdwijning</text><text x="600" y="650" fill="#dce9e3" font-family="Georgia,serif" font-size="23" font-style="italic">Harmonie is pas wederkerig wanneer ook jouw verschil erin mag bestaan.</text></g>
</svg>
