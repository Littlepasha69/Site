    <path d="M529 335c4-62 49-102 103-96 47 5 81 47 74 92-7 48-54 79-100 65-38-12-60-52-45-88 12-29 48-44 76-28 22 13 30 43 16 64-12 18-38 22-54 8-12-11-12-31 0-41" fill="none" stroke="#f0c66b" stroke-width="9" stroke-linecap="round"/>
