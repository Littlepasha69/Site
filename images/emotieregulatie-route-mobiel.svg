<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1210" role="img" aria-labelledby="title desc">
  <title id="title">Vijf aangrijpingspunten voor emotieregulatie op kleine schermen</title>
  <desc id="desc">Een verticale route met situatie kiezen, situatie veranderen, aandacht verschuiven, betekenis herzien en reactie beïnvloeden.</desc>
  <defs><linearGradient id="emb" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#26172f"/><stop offset=".62" stop-color="#4a2948"/><stop offset="1" stop-color="#7b4a4f"/></linearGradient><marker id="ema" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#f0c66b"/></marker></defs>
  <rect width="720" height="1210" rx="36" fill="url(#emb)"/>
  <circle cx="630" cy="100" r="210" fill="#f0c66b" opacity=".08"/>
  <text x="54" y="62" fill="#f0c66b" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3">LEESKAART · EMOTIEREGULATIE</text>
  <text x="54" y="112" fill="#fffdf9" font-family="Georgia, serif" font-size="34" font-weight="700">Vijf plaatsen waar</text>
  <text x="54" y="152" fill="#fffdf9" font-family="Georgia, serif" font-size="34" font-weight="700">beweging mogelijk is.</text>
  <text x="54" y="184" fill="#fff" fill-opacity=".62" font-family="Arial, sans-serif" font-size="15">Geen verplichte stappen. Geen vaste rangorde.</text>

  <path d="M93 262v685" fill="none" stroke="#f0c66b" stroke-width="4" stroke-opacity=".7"/>
  <g font-family="Arial, sans-serif">
