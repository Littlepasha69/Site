    <path d="M93 340v45" stroke="#f0c66b" stroke-width="3" marker-end="url(#ema)"/>
    <g transform="translate(54 392)"><circle cx="39" cy="40" r="34" fill="#f0c66b"/><text x="39" y="49" text-anchor="middle" fill="#301c35" font-size="22" font-weight="800">02</text><rect x="86" width="580" height="114" rx="24" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="118" y="36" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="2">SITUATIE</text><text x="118" y="71" fill="#fffdf9" font-family="Georgia, serif" font-size="27" font-weight="700">Veranderen</text><text x="118" y="96" fill="#fff" fill-opacity=".55" font-size="14">grens · informatie · afstand · steun</text></g>
    <path d="M93 510v45" stroke="#f0c66b" stroke-width="3" marker-end="url(#ema)"/>
    <g transform="translate(54 562)"><circle cx="39" cy="40" r="34" fill="#f0c66b"/><text x="39" y="49" text-anchor="middle" fill="#301c35" font-size="22" font-weight="800">03</text><rect x="86" width="580" height="114" rx="24" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="118" y="36" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="2">AANDACHT</text><text x="118" y="71" fill="#fffdf9" font-family="Georgia, serif" font-size="27" font-weight="700">Verschuiven</text><text x="118" y="96" fill="#fff" fill-opacity=".55" font-size="14">richten · afleiden · vernauwen</text></g>
    <path d="M93 680v45" stroke="#f0c66b" stroke-width="3" marker-end="url(#ema)"/>
    <g transform="translate(54 732)"><circle cx="39" cy="40" r="34" fill="#f0c66b"/><text x="39" y="49" text-anchor="middle" fill="#301c35" font-size="22" font-weight="800">04</text><rect x="86" width="580" height="114" rx="24" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="118" y="36" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="2">BETEKENIS</text><text x="118" y="71" fill="#fffdf9" font-family="Georgia, serif" font-size="27" font-weight="700">Herzien</text><text x="118" y="96" fill="#fff" fill-opacity=".55" font-size="14">duiden · onderzoeken · herkaderen</text></g>
