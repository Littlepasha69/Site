<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Drie routes door de basale ganglia</title>
  <desc id="desc">Vereenvoudigde leeskaart van de directe, indirecte en hyperdirecte route tussen cortex, striatum, globus pallidus, subthalamische kern, thalamus en uitvoerende systemen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2b32"/>
      <stop offset="0.55" stop-color="#164844"/>
      <stop offset="1" stop-color="#422d47"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#061a1c" flood-opacity=".38"/>
    </filter>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#f0c66b"/></marker>
    <marker id="arrowMint" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#8fd7ba"/></marker>
    <marker id="arrowRose" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#dc91ad"/></marker>
    <marker id="arrowCream" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#f7f1e7"/></marker>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <g opacity=".1" fill="none" stroke="#f8eac0">
    <circle cx="1040" cy="105" r="190"/><circle cx="1040" cy="105" r="145"/><circle cx="120" cy="690" r="210"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="72" fill="#f0c66b" font-size="18" font-weight="700" letter-spacing="4">LEESKAART · GEEN BEDRADINGSSCHEMA</text>
    <text x="70" y="118" fill="#fffaf0" font-family="Georgia, serif" font-size="38" font-weight="700">Drie routes, één voortdurend onderhandelend netwerk</text>

    <g filter="url(#shadow)">
      <rect x="455" y="155" width="290" height="82" rx="22" fill="#f7f1e7"/>
      <text x="600" y="188" text-anchor="middle" fill="#123c3c" font-size="15" font-weight="700" letter-spacing="2">CORTEX</text>
      <text x="600" y="216" text-anchor="middle" fill="#45615e" font-size="16">context · plan · conflict</text>

      <rect x="105" y="330" width="250" height="100" rx="22" fill="#173d3b" stroke="#8fd7ba" stroke-width="2"/>
      <text x="230" y="370" text-anchor="middle" fill="#8fd7ba" font-size="15" font-weight="700" letter-spacing="2">STRIATUM</text>
      <text x="230" y="399" text-anchor="middle" fill="#eef8f2" font-size="16">caudatus · putamen</text>

      <rect x="475" y="330" width="250" height="100" rx="22" fill="#3e2944" stroke="#dc91ad" stroke-width="2"/>
      <text x="600" y="370" text-anchor="middle" fill="#dc91ad" font-size="15" font-weight="700" letter-spacing="2">GPe</text>
      <text x="600" y="399" text-anchor="middle" fill="#faeef5" font-size="16">extern pallidum</text>

      <rect x="845" y="330" width="250" height="100" rx="22" fill="#49371f" stroke="#f0c66b" stroke-width="2"/>
      <text x="970" y="370" text-anchor="middle" fill="#f0c66b" font-size="15" font-weight="700" letter-spacing="2">STN</text>
      <text x="970" y="399" text-anchor="middle" fill="#fff7df" font-size="16">subthalamische kern</text>

      <rect x="455" y="510" width="290" height="92" rx="22" fill="#143532" stroke="#f7f1e7" stroke-opacity=".55"/>
      <text x="600" y="548" text-anchor="middle" fill="#fffaf0" font-size="15" font-weight="700" letter-spacing="2">GPi / SNr</text>
      <text x="600" y="577" text-anchor="middle" fill="#c8d8d3" font-size="16">belangrijke uitvoerpoorten</text>

      <rect x="455" y="660" width="290" height="66" rx="22" fill="#f7f1e7"/>
      <text x="600" y="700" text-anchor="middle" fill="#123c3c" font-size="17" font-weight="700">thalamus · hersenstam · actie</text>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M520 237 C390 270 255 270 230 320" stroke="#f7f1e7" stroke-width="7" marker-end="url(#arrowCream)"/>
      <path d="M230 430 C275 535 370 555 442 555" stroke="#8fd7ba" stroke-width="7" marker-end="url(#arrowMint)"/>
      <path d="M600 602 L600 648" stroke="#8fd7ba" stroke-width="7" marker-end="url(#arrowMint)"/>

      <path d="M355 380 L463 380" stroke="#dc91ad" stroke-width="7" marker-end="url(#arrowRose)"/>
      <path d="M725 380 L833 380" stroke="#dc91ad" stroke-width="7" marker-end="url(#arrowRose)"/>
      <path d="M920 430 C855 505 820 555 758 555" stroke="#dc91ad" stroke-width="7" marker-end="url(#arrowRose)"/>

      <path d="M700 237 C835 270 948 273 970 318" stroke="#f0c66b" stroke-width="7" marker-end="url(#arrowGold)"/>
      <path d="M970 430 C900 530 825 555 758 555" stroke="#f0c66b" stroke-width="7" marker-end="url(#arrowGold)"/>
    </g>

    <g font-size="15" font-weight="700">
      <rect x="72" y="253" width="186" height="42" rx="21" fill="#8fd7ba"/><text x="165" y="280" text-anchor="middle" fill="#103934">DIRECTE ROUTE</text>
      <rect x="280" y="253" width="198" height="42" rx="21" fill="#dc91ad"/><text x="379" y="280" text-anchor="middle" fill="#3c233c">INDIRECTE ROUTE</text>
      <rect x="875" y="253" width="220" height="42" rx="21" fill="#f0c66b"/><text x="985" y="280" text-anchor="middle" fill="#49371f">HYPERDIRECTE ROUTE</text>
    </g>

    <g font-size="14" fill="#d6e3df">
      <text x="70" y="466">direct en indirect</text><text x="70" y="487">delen deze ingang</text>
      <text x="70" y="520">geselecteerde actie</text><text x="70" y="541">krijgt meer invloed</text>
      <text x="485" y="470">concurrenten en context</text><text x="485" y="491">worden meegewogen</text>
      <text x="885" y="482">snelle verhoging</text><text x="885" y="503">van de stopdrempel</text>
    </g>
  </g>
</svg>
