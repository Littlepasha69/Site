<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Boosheid als signaal en keuzepunt</title>
  <desc id="desc">Drie golven bewegen van hitte en betekenis naar een kruispunt tussen impuls en bewuste richting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#24162f"/><stop offset=".58" stop-color="#4a2948"/><stop offset="1" stop-color="#704248"/></linearGradient>
    <radialGradient id="glow"><stop offset="0" stop-color="#f0c66b" stop-opacity=".42"/><stop offset="1" stop-color="#f0c66b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="950" cy="150" r="310" fill="url(#glow)"/>
  <path d="M-40 575c175-98 268 91 438-7 163-94 283 88 450-4 140-77 242 7 393-36" fill="none" stroke="#fff" stroke-opacity=".06" stroke-width="120"/>
  <text x="72" y="82" fill="#f0c66b" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="4">DE MENSELIJKE ATLAS · EMOTIES &amp; REGULATIE</text>
  <text x="72" y="158" fill="#fffdf9" font-family="Georgia, serif" font-size="60" font-weight="700">Boosheid is een signaal.</text>
  <text x="72" y="205" fill="#fff" fill-opacity=".64" font-family="Arial, sans-serif" font-size="21">Geen vonnis en geen bevel.</text>
  <g transform="translate(72 296)" fill="none" stroke="#f0c66b" stroke-width="9" stroke-linecap="round">
    <path d="M0 0c68-50 134 50 202 0s134-50 202 0"/>
    <path d="M0 68c68-50 134 50 202 0s134-50 202 0" opacity=".78"/>
    <path d="M0 136c68-50 134 50 202 0s134-50 202 0" opacity=".56"/>
  </g>
  <g transform="translate(588 275)">
    <circle cx="102" cy="100" r="100" fill="#fff" fill-opacity=".07" stroke="#fff" stroke-opacity=".18"/>
    <path d="M102 38v124M40 100h124" fill="none" stroke="#f0c66b" stroke-width="6" stroke-linecap="round"/>
    <circle cx="102" cy="100" r="15" fill="#f0c66b"/>
    <text x="102" y="232" text-anchor="middle" fill="#fffdf9" font-family="Georgia, serif" font-size="25" font-weight="700">keuzepunt</text>
  </g>
  <g transform="translate(860 282)" font-family="Arial, sans-serif">
    <text x="0" y="0" fill="#f0c66b" font-size="14" font-weight="700" letter-spacing="3">WAT LIJKT ER OP HET SPEL?</text>
    <g transform="translate(0 28)" fill="#fffdf9" font-size="17">
      <rect width="252" height="52" rx="26" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".15"/><text x="126" y="33" text-anchor="middle">grens &amp; waardigheid</text>
      <rect y="66" width="252" height="52" rx="26" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".15"/><text x="126" y="99" text-anchor="middle">rechtvaardigheid</text>
      <rect y="132" width="252" height="52" rx="26" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".15"/><text x="126" y="165" text-anchor="middle">verbondenheid</text>
    </g>
  </g>
  <line x1="72" y1="628" x2="1128" y2="628" stroke="#fff" stroke-opacity=".16"/>
  <text x="72" y="674" fill="#fff" fill-opacity=".58" font-family="Arial, sans-serif" font-size="17">Voelen → onderzoeken → kiezen wat beschermt zonder te beschadigen.</text>
</svg>
