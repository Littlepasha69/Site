<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Dissociatie als veranderde verbinding</title>
  <desc id="desc">Een kaart met aandacht, lichaam, geheugen en zelfgevoel die normaal rond continuïteit samenwerken, maar bij dissociatie tijdelijk losser verbonden kunnen aanvoelen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d2a37"/><stop offset=".55" stop-color="#17474c"/><stop offset="1" stop-color="#56334f"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#f0c66b" stop-opacity=".22"/><stop offset="1" stop-color="#f0c66b" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#061921" flood-opacity=".3"/></filter>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1010" cy="90" r="270" fill="url(#glow)"/>
  <text x="64" y="72" fill="#f0c66b" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3">TRAUMA &amp; HERSTEL</text>
  <text x="64" y="119" fill="#fffaf2" font-family="Georgia, serif" font-size="38" font-weight="700">Niet verdwenen. Anders verbonden.</text>
  <text x="64" y="153" fill="#c9dad8" font-family="Arial, sans-serif" font-size="17">Dissociatie kan de continuïteit van een ervaring veranderen zonder haar tot verbeelding te maken.</text>

  <g transform="translate(600 390)" filter="url(#shadow)">
    <circle r="104" fill="#fff" fill-opacity=".07" stroke="#fff" stroke-opacity=".18"/>
    <circle r="66" fill="#f0c66b" fill-opacity=".13" stroke="#f0c66b" stroke-opacity=".6"/>
    <text y="-6" text-anchor="middle" fill="#f0c66b" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.6">CONTINUÏTEIT</text>
    <text y="27" text-anchor="middle" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">dit ben ik, hier, nu</text>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(138 218)"><rect width="250" height="116" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="24" y="34" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="1.4">AANDACHT</text><text x="24" y="70" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Waar ben ik?</text><text x="24" y="96" fill="#bfd2cf" font-size="14">vernauwd · ver weg · geabsorbeerd</text></g>
    <g transform="translate(812 218)"><rect width="250" height="116" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="24" y="34" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="1.4">LICHAAM</text><text x="24" y="70" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Voelt dit als mij?</text><text x="24" y="96" fill="#bfd2cf" font-size="14">vreemd · vlak · buiten mezelf</text></g>
    <g transform="translate(138 464)"><rect width="250" height="116" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="24" y="34" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="1.4">GEHEUGEN</text><text x="24" y="70" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Wat ontbreekt?</text><text x="24" y="96" fill="#bfd2cf" font-size="14">vaag · niet bereikbaar · tijd kwijt</text></g>
    <g transform="translate(812 464)"><rect width="250" height="116" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/><text x="24" y="34" fill="#f0c66b" font-size="12" font-weight="700" letter-spacing="1.4">ZELFGEVOEL</text><text x="24" y="70" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Wie handelt?</text><text x="24" y="96" fill="#bfd2cf" font-size="14">onwerkelijk · verdeeld · niet van mij</text></g>
  </g>

  <g fill="none" stroke="#d6e4e1" stroke-opacity=".55" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="9 10">
    <path d="M388 276C460 282 480 314 518 338"/><path d="M812 276C740 282 720 314 682 338"/><path d="M388 522C455 506 482 474 518 444"/><path d="M812 522C745 506 718 474 682 444"/>
  </g>
  <g fill="#f0c66b"><circle cx="477" cy="314" r="5"/><circle cx="723" cy="314" r="5"/><circle cx="478" cy="475" r="5"/><circle cx="722" cy="475" r="5"/></g>
  <text x="600" y="625" text-anchor="middle" fill="#d8e4e1" font-family="Georgia, serif" font-size="18" font-style="italic">De verbinding kan wisselen. Eén symptoom vertelt nog niet waarom.</text>
  <text x="64" y="652" fill="#9fbbb7" font-family="Arial, sans-serif" font-size="13">DE MENSELIJKE ATLAS · DE ONWIJZE WIJSHEDEN</text>
</svg>
