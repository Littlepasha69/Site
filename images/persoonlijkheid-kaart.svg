  <g fill="#fff8e8">
    <text x="535" y="180" font-family="Georgia, serif" font-size="64" font-weight="700">Je bent geen type.</text>
    <text x="538" y="233" font-family="Arial, sans-serif" font-size="23" fill="#d7e3df">Je bent een herkenbaar patroon dat beweegt</text>
    <text x="538" y="266" font-family="Arial, sans-serif" font-size="23" fill="#d7e3df">door situaties, relaties en tijd.</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <g transform="translate(540 344)"><rect width="244" height="76" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><circle cx="38" cy="38" r="14" fill="#edbd58"/><text x="68" y="45" fill="#fff8e8">Trekken</text></g>
    <g transform="translate(808 344)"><rect width="244" height="76" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><path d="M834 382h24M846 370v24" stroke="#edbd58" stroke-width="7" stroke-linecap="round"/><text x="876" y="45" fill="#fff8e8">Situaties</text></g>
    <g transform="translate(540 444)"><rect width="244" height="76" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><path d="M568 487l12-22 12 22z" fill="none" stroke="#edbd58" stroke-width="6"/><text x="608" y="45" fill="#fff8e8">Doelen &amp; waarden</text></g>
    <g transform="translate(808 444)"><rect width="244" height="76" rx="18" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".14"/><path d="M834 468c18 0 24 9 24 22-18 0-24-9-24-22z" fill="none" stroke="#edbd58" stroke-width="6"/><text x="876" y="45" fill="#fff8e8">Levensverhalen</text></g>
