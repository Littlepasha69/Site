<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Persoonlijkheid als bewegend patroon</title>
  <desc id="desc">Een vingerafdruk vloeit over in vier lagen: trekken, situaties, doelen en verhalen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102f31"/>
      <stop offset=".52" stop-color="#174c49"/>
      <stop offset="1" stop-color="#4b2b49"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(895 150) rotate(132) scale(475)">
      <stop stop-color="#edbd58" stop-opacity=".3"/>
      <stop offset="1" stop-color="#edbd58" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="720" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="720" rx="30" fill="url(#glow)"/>
  <circle cx="286" cy="360" r="205" fill="#f7ead0" opacity=".055"/>
  <circle cx="286" cy="360" r="155" fill="none" stroke="#edbd58" stroke-opacity=".13" stroke-width="32" filter="url(#soft)"/>

  <g fill="none" stroke="#f2ca76" stroke-width="10" stroke-linecap="round" opacity=".96">
    <path d="M285 224c-72 0-130 58-130 130 0 49-5 93-17 132"/>
    <path d="M387 279a130 130 0 0 1 28 81c0 52 1 94 12 137"/>
    <path d="M214 505c19-57 23-99 23-151a49 49 0 0 1 85-33"/>
    <path d="M351 353c0 61-1 127 18 188"/>
    <path d="M286 353c0 61-4 123-28 183"/>
    <path d="M107 354c0-99 80-179 179-179 49 0 94 20 126 52"/>
    <path d="M448 557c-22-63-24-126-24-197"/>
    <path d="M178 569c29-66 41-137 41-215a67 67 0 0 1 119-42"/>
