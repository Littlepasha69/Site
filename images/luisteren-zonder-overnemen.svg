<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Luisteren zonder over te nemen</title><desc id="desc">Twee mensen zijn verbonden door luistergolven terwijl het stuur bij de verteller blijft.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d2935"/><stop offset=".55" stop-color="#174c50"/><stop offset="1" stop-color="#4d3558"/></linearGradient><radialGradient id="glow"><stop stop-color="#efc467" stop-opacity=".28"/><stop offset="1" stop-color="#efc467" stop-opacity="0"/></radialGradient></defs>
  <rect width="1200" height="720" rx="30" fill="url(#bg)"/><circle cx="600" cy="350" r="290" fill="url(#glow)"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="275" cy="335" r="78" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".2"/><circle cx="925" cy="335" r="78" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".2"/><path d="M370 300C455 230 520 230 600 300C680 370 745 370 830 300" stroke="#efc467" stroke-width="5"/><path d="M370 340C455 270 520 270 600 340C680 410 745 410 830 340" stroke="#dce9e3" stroke-opacity=".58" stroke-width="3"/><path d="M370 380C455 310 520 310 600 380C680 450 745 450 830 380" stroke="#dce9e3" stroke-opacity=".28" stroke-width="3"/><circle cx="600" cy="350" r="88" stroke="#fff" stroke-opacity=".18"/><circle cx="600" cy="350" r="48" stroke="#efc467" stroke-width="4"/><path d="M600 302v96M552 350h96" stroke="#efc467" stroke-opacity=".7" stroke-width="3"/><circle cx="600" cy="350" r="8" fill="#fff9ea" stroke="none"/></g>
  <g font-family="Arial,sans-serif" text-anchor="middle"><text x="275" y="330" fill="#efc467" font-size="12" font-weight="800" letter-spacing="2">VERTELLER</text><text x="275" y="358" fill="#fff" font-size="17">mijn ervaring</text><text x="925" y="330" fill="#efc467" font-size="12" font-weight="800" letter-spacing="2">LUISTERAAR</text><text x="925" y="358" fill="#fff" font-size="17">jouw aandacht</text><text x="600" y="478" fill="#efc467" font-size="12" font-weight="800" letter-spacing="3">HET STUUR</text><text x="600" y="512" fill="#fff9ea" font-family="Georgia,serif" font-size="29" font-weight="700">blijft waar het hoort</text><text x="600" y="650" fill="#dce9e3" font-family="Georgia,serif" font-size="23" font-style="italic">Goede hulp maakt iemand niet kleiner om noodzakelijk te kunnen blijven.</text></g>
</svg>
