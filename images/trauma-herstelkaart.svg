<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Herstel na trauma</title>
  <desc id="desc">Een kaart die toont hoe bescherming na gevaar kan blijven doorwerken en hoe veiligheid, betekenis, relatie en oefening opnieuw keuzevrijheid kunnen openen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102f36"/><stop offset=".56" stop-color="#174b47"/><stop offset="1" stop-color="#5d344c"/>
    </linearGradient>
    <radialGradient id="glow"><stop stop-color="#f0c66b" stop-opacity=".2"/><stop offset="1" stop-color="#f0c66b" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#071c20" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="990" cy="96" r="250" fill="url(#glow)"/>
  <path d="M-60 590C165 500 247 665 462 560S817 485 1260 565" fill="none" stroke="#fff" stroke-opacity=".06" stroke-width="2"/>
  <text x="64" y="72" fill="#f0c66b" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3">TRAUMA &amp; HERSTEL</text>
  <text x="64" y="119" fill="#fffaf0" font-family="Georgia, serif" font-size="38" font-weight="700">Herstel is geen wissen.</text>
  <text x="64" y="153" fill="#d4e2de" font-family="Arial, sans-serif" font-size="17">Het is opnieuw verschil leren voelen tussen toen, nu en wat je kunt kiezen.</text>

  <g filter="url(#shadow)">
    <rect x="64" y="214" width="218" height="120" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/>
    <text x="88" y="247" fill="#f0c66b" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">01 · GEBEURTENIS</text>
    <text x="88" y="282" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Er gebeurt iets</text>
    <text x="88" y="310" fill="#c6d7d3" font-family="Arial, sans-serif" font-size="14">dat draagkracht overschrijdt.</text>

    <rect x="338" y="214" width="218" height="120" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/>
    <text x="362" y="247" fill="#f0c66b" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">02 · BESCHERMING</text>
    <text x="362" y="282" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Het systeem leert</text>
    <text x="362" y="310" fill="#c6d7d3" font-family="Arial, sans-serif" font-size="14">voorspellen, vermijden, overleven.</text>

    <rect x="612" y="214" width="244" height="120" rx="22" fill="#fff" fill-opacity=".09" stroke="#fff" stroke-opacity=".16"/>
    <text x="636" y="247" fill="#f0c66b" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">03 · HET SPOOR</text>
    <text x="636" y="282" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Toen duikt op in nu</text>
    <text x="636" y="310" fill="#c6d7d3" font-family="Arial, sans-serif" font-size="14">via lichaam, beeld, betekenis of relatie.</text>

    <rect x="912" y="214" width="224" height="120" rx="22" fill="#f0c66b" fill-opacity=".15" stroke="#f0c66b" stroke-opacity=".55"/>
    <text x="936" y="247" fill="#f0c66b" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">04 · HERSTEL</text>
    <text x="936" y="282" fill="#fff" font-family="Georgia, serif" font-size="23" font-weight="700">Meer keuzevrijheid</text>
    <text x="936" y="310" fill="#e5ddd7" font-family="Arial, sans-serif" font-size="14">niet vergeten, wel anders kunnen.</text>
  </g>

  <g fill="none" stroke="#f0c66b" stroke-width="3" stroke-linecap="round">
    <path d="M290 274h36"/><path d="m320 267 8 7-8 7"/>
    <path d="M564 274h36"/><path d="m594 267 8 7-8 7"/>
    <path d="M864 274h36"/><path d="m894 267 8 7-8 7"/>
  </g>

  <g transform="translate(64 397)">
    <rect width="1072" height="187" rx="24" fill="#071f25" fill-opacity=".34" stroke="#fff" stroke-opacity=".12"/>
    <text x="28" y="40" fill="#f0c66b" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">WAT HERSTEL KAN DRAGEN</text>
    <g font-family="Arial, sans-serif">
      <circle cx="56" cy="93" r="23" fill="#dce9e2" fill-opacity=".13"/><path d="M45 94c8-12 15-12 23 0-8 12-15 12-23 0Z" fill="none" stroke="#dce9e2" stroke-width="2"/><circle cx="56.5" cy="94" r="3" fill="#f0c66b"/>
      <text x="92" y="88" fill="#fff" font-size="17" font-weight="700">Werkelijke veiligheid</text><text x="92" y="112" fill="#b9cfca" font-size="14">gevaar verkleinen, steun en middelen</text>
      <circle cx="334" cy="93" r="23" fill="#dce9e2" fill-opacity=".13"/><path d="M323 92h22M334 81v22" stroke="#dce9e2" stroke-width="2" stroke-linecap="round"/>
      <text x="370" y="88" fill="#fff" font-size="17" font-weight="700">Betekenis bijstellen</text><text x="370" y="112" fill="#b9cfca" font-size="14">schuld, gevaar en tijd opnieuw plaatsen</text>
      <circle cx="642" cy="93" r="23" fill="#dce9e2" fill-opacity=".13"/><path d="M631 98c8-12 14-12 22 0M635 87a7 7 0 0 1 14 0" fill="none" stroke="#dce9e2" stroke-width="2"/>
      <text x="678" y="88" fill="#fff" font-size="17" font-weight="700">Erkende relatie</text><text x="678" y="112" fill="#b9cfca" font-size="14">gehoord worden zonder gedwongen verhaal</text>
      <circle cx="917" cy="93" r="23" fill="#dce9e2" fill-opacity=".13"/><path d="m907 94 7 7 14-18" fill="none" stroke="#f0c66b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="953" y="88" fill="#fff" font-size="17" font-weight="700">Nieuwe ervaring</text><text x="953" y="112" fill="#b9cfca" font-size="14">kleine, herhaalde correcties</text>
    </g>
    <text x="28" y="160" fill="#d7e2df" font-family="Georgia, serif" font-size="18" font-style="italic">Geen enkele route is verplicht. Wat helpt, hangt af van persoon, patroon, voorkeur en context.</text>
  </g>
  <text x="64" y="630" fill="#adc5c0" font-family="Arial, sans-serif" font-size="13">DE MENSELIJKE ATLAS · DE ONWIJZE WIJSHEDEN</text>
</svg>
